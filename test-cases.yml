---
- summary: |
    Проверка корректности HTTP-статуса страницы
  requirement: |
    Сервер должен возвращать корректные HTTP-статусы
  prerequisites: |
    Открыт DevTools
  test-data: |
    https://codebattle.hexlet.io/
  steps:
    - Перейти во вкладку Network
    - Обновить страницу
    - Найти основной запрос
  expected-result: |
    Статус ответа 200 OK

- summary: |
    Проверка влияния ошибок в консоли на функциональность
  requirement: |
    Основной контент должен загружаться без ошибок
  prerequisites: |
    Открыт браузер
  test-data: |
    https://codebattle.hexlet.io/
  steps:
    - Открыть DevTools
    - Перейти на вкладку Console
  expected-result: |
    Отсутствуют критические ошибки, влияющие на основной функционал сайта

- summary: |
    Успешная авторизация пользователя
  requirement: |
    Пользователь должен иметь возможность войти в систему
  prerequisites: |
    Открыта страница входа https://codebattle.hexlet.io/session/new?locale=en&next=%2F
  test-data: |
    Валидный email и пароль
  steps:
    - Ввести email
    - Ввести пароль
    - Нажать "Sign in"
  expected-result: |
    Пользователь успешно авторизован и попадает на главную страницу

- summary: |
    Ошибка авторизации при неверных данных
  requirement: |
    При неверных данных пользователь получает ошибку
  prerequisites: |
    Открыта страница входа https://codebattle.hexlet.io/session/new?locale=en&next=%2F
  test-data: |
    Некорректные данные
  steps:
    - Ввести некорректные данные
    - Нажать "Sign in"
  expected-result: |
    Отображается сообщение об ошибке, вход не выполнен

- summary: |
    Успешное создание игры авторизованным пользователем
  requirement: |
    Авторизованный пользователь может создать игру
  prerequisites: |
    Пользователь авторизован
  test-data: |
    -
  steps:
    - Нажать "Создать битву"
  expected-result: |
    Игра создается

- summary: |
    Подключение второго игрока к игре
  requirement: |
    Пользователь может подключиться к доступной игре
  prerequisites: |
    Существует созданная игра в ожидании
  test-data: |
    -
  steps:
    - Нажать "Присоединиться к битве"
    - Выбрать игру из списка
    - Нажать "Сражаться"
  expected-result: |
    Оба игрока переходят в игровое пространство

- summary: |
    Проверка синхронизации кода между игроками
  requirement: |
    Код должен синхронизироваться в реальном времени
  prerequisites: |
    Два игрока в игре
  test-data: |
    Любой код
  steps:
    - Игрок 1 начинает вводить код
    - Игрок 2 наблюдает за редактором соперника
  expected-result: |
    Код отображается у второго игрока в реальном времени

- summary: |
    Проверка работы кнопки "Запустить"
  requirement: |
    Пользователь может проверять решение неограниченное количество раз
  prerequisites: |
    Пользователь в игре
  test-data: |
    Невалидное решение
  steps:
    - Ввести код
    - Нажать "Запустить" несколько раз
  expected-result: |
    Проверка выполняется каждый раз, ограничений нет

- summary: |
    Завершение игры при успешном решении
  requirement: |
    При успешной проверке определяется победитель
  prerequisites: |
    Два игрока в игре
  test-data: |
    Валидное решение
  steps:
    - Ввести корректное решение
    - Нажать "Запустить"
  expected-result: |
    Появляется модальное окно с победителем

- summary: |
    Поведение проигравшего после завершения игры
  requirement: |
    Проигравший может продолжать взаимодействие
  prerequisites: |
    Игра завершена
  test-data: |
    -
  steps:
    - Проигравший продолжает писать код
    - Нажимает "Запустить"
  expected-result: |
    Проверка доступна, но победитель не меняется

- summary: |
    Закрытие игры после выхода обоих игроков
  requirement: |
    Игра удаляется после выхода всех участников
  prerequisites: |
    Игра завершена
  test-data: |
    -
  steps:
    - Первый игрок нажимает "На главный"
    - Второй игрок нажимает "На главный"
  expected-result: |
    Игра закрывается и исчезает из списка

- summary: |
    Успешное подключение к игре в режиме наблюдателя
  requirement: |
    Пользователь может наблюдать за чужой игрой
  prerequisites: |
    Существует активная игра
  test-data: |
    -
  steps:
    - Найти активную игру
    - Нажать "Show"
  expected-result: |
    Пользователь подключается к игре в режиме наблюдателя

- summary: |
    Проверка отображения игрового процесса для наблюдателя
  requirement: |
    Наблюдатель видит игровой процесс в реальном времени
  prerequisites: |
    Пользователь подключен как наблюдатель
  test-data: |
    -
  steps:
    - Наблюдать за редакторами игроков
    - Дождаться изменений кода
  expected-result: |
    Изменения кода отображаются в реальном времени

- summary: |
    Ограничение действий наблюдателя
  requirement: |
    Наблюдатель не может вмешиваться в игру
  prerequisites: |
    Пользователь находится в режиме наблюдателя
  test-data: |
    -
  steps:
    - Попробовать ввести код
  expected-result: |
    Действия недоступны

- summary: |
    Просмотр профиля пользователя
  requirement: |
    Пользователь может просматривать профиль
  prerequisites: |
    Пользователь авторизован
  test-data: |
    -
  steps:
    - Перейти в профиль пользователя
  expected-result: |
    Отображается информация профиля (имя, статистика, турниры, завершенные игры)

- summary: |
    Изменение настроек профиля
  requirement: |
    Пользователь может изменять настройки профиля
  prerequisites: |
    Пользователь авторизован и открыт раздел настроек
  test-data: |
    Новое значение настройки "имя"
  steps:
    - Изменить значение настройки
    - Нажать кнопку сохранения
  expected-result: |
    Настройки успешно сохраняются

- summary: |
    Сохранение настроек после обновления страницы
  requirement: |
    Изменения в настройках сохраняются после обновления страницы
  prerequisites: |
    Пользователь изменил настройки
  test-data: |
    -
  steps:
    - Обновить страницу
    - Открыть настройки
  expected-result: |
    Изменённые настройки сохранены и отображаются корректно

- summary: |
    Попытка сохранить некорректные данные в настройках
  requirement: |
    Система должна валидировать данные настроек
  prerequisites: |
    Пользователь находится в настройках
  test-data: |
    Некорректные данные в поле "Имя"
  steps:
    - Ввести пустое значение в поле "Имя"
  expected-result: |
    Отображается ошибка, данные сохранить нельзя, кнопка сохранения неактивна

- summary: |
    Просмотр профиля другого пользователя
  requirement: |
    Пользователь может просматривать профиль другого пользователя
  prerequisites: |
    Пользователь авторизован
  test-data: |
    Любой другой пользователь в системе
  steps:
    - Найти другого пользователя в рейтинге
    - Перейти в его профиль
  expected-result: |
    Открывается страница профиля другого пользователя с его данными

- summary: |
    Отображение всплывающего окна со статистикой игрока
  requirement: |
    Пользователь может просматривать краткую информацию о другом игроке во всплывающем окне
  prerequisites: |
    В списке есть игра в ожидании второго игрока
  test-data: |
    -
  steps:
    - Найти игру в статусе ожидания
    - Навести курсор на имя игрока
  expected-result: |
    Появляется всплывающее окно с краткой статистикой игрока

- summary: |
    Закрытие всплывающего окна со статистикой
  requirement: |
    Всплывающее окно должно корректно закрываться
  prerequisites: |
    Открыто всплывающее окно
  test-data: |
    -
  steps:
    - Убрать курсор 
  expected-result: |
    Всплывающее окно закрывается

- summary: |
    Проверка адаптивности сайта
  requirement: |
    Сайт должен быть удобным на мобильных устройствах
  prerequisites: |
    Открыт DevTools
  test-data: |
    Поменять разрешение экрана на "мобильный"
  steps:
    - Выбрать мобильное устройство
    - Обновить страницу
  expected-result: |
    Верстка не ломается, элементы отображаются корректно

- summary: |
    Проверка использования HTTPS
  requirement: |
    Сайт должен быть безопасным и защищать данные пользователя
  prerequisites: |
    Браузер открыт
  test-data: |
    http://codebattle.hexlet.io/
  steps:
    - Открыть сайт
    - Проверить адресную строку
  expected-result: |
    Используется HTTPS

- summary: |
    Проверка работы сайта в разных браузерах
  requirement: |
    Сайт должен корректно работать в последних версиях браузеров
  prerequisites: |
    Установлены Chrome, Firefox, Edge
  test-data: |
    https://codebattle.hexlet.io/
  steps:
    - Открыть сайт в каждом браузере
    - Проверить отображение и базовую навигацию
  expected-result: |
    Сайт отображается и работает одинаково корректно

- summary: |
    Проверка интуитивной понятности интерфейса
  requirement: |
    Интерфейс должен быть интуитивно понятен пользователю
  prerequisites: |
    Сайт открыт https://codebattle.hexlet.io/
  test-data: |
    Главная страница
  steps:
    - Открыть главную страницу сайта
    - Попробовать найти основные функции (игра, вход, регистрация)
  expected-result: |
    Пользователь без труда находит основные функции и понимает, как ими воспользоваться

- summary: |
    Проверка кликабельности элементов
  requirement: |
    Кнопки и ссылки должны быть кликабельны
  prerequisites: |
    Сайт открыт https://codebattle.hexlet.io/
  test-data: |
    Главная страница
  steps:
    - Найти кнопку или ссылку
    - Кликнуть по элементу
  expected-result: |
    Происходит ожидаемое действие

- summary: |
    Проверка читаемости текста
  requirement: |
    Текст должен быть читаемым
  prerequisites: |
    https://codebattle.hexlet.io/
  test-data: |
    Любая страница сайта
  steps:
    - Просмотреть текст на странице
    - Оценить размер шрифта и контраст
  expected-result: |
    Текст легко читается, не сливается с фоном

- summary: |
    Проверка предсказуемости поведения элементов
  requirement: |
    Поведение элементов должно быть предсказуемо
  prerequisites: |
    Сайт открыт https://codebattle.hexlet.io/
  test-data: |
    Кнопки и ссылки интерфейса
  steps:
    - Найти кнопку или ссылку 
    - Кликнуть по элементу
  expected-result: |
    Результат соответствует ожиданию пользователя

- summary: |
    Проверка загрузки изображений без ошибок
  requirement: |
    Изображения на сайте должны загружаться без ошибок
  prerequisites: |
    Открыт DevTools
  test-data: |
    https://codebattle.hexlet.io/
  steps:
    - Открыть DevTools
    - Перейти на вкладку Console
    - Обновить страницу
    - Проверить наличие ошибок загрузки изображений
  expected-result: |
    Изображения загружаются без ошибок, в консоли нет ошибок, связанных с их загрузкой
